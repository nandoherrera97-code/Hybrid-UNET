model:
  input_shape: [512, 256, 1]   # (H, W, canales) — grid 512×256

training:
  epochs: 1000
  batch_size: 4              # reducido respecto al grid 80×200 por mayor resolución
  learning_rate: 0.001
  val_size:  0.15   # fracción de validación (early stopping) — sobre el total del dataset
  test_size: 0.15   # fracción de test hold-out — nunca visto durante el entrenamiento
  random_state: 42
  patience: 10               # EarlyStopping
  loss_alpha: 3.0            # Peso near-wall: mayor → más concentrado en pared

evaluation:
  nearwall_cells: 2   # Umbral = nearwall_cells × resolución espacial del grid (mín. SDF no nulo)

paths:
  dataset:       "data/processed/CNN_df_512x256.pkl"
  saved_model:   "saved_models/best_model_512x256.weights.h5"
  split_indices: "saved_models/split_indices_512x256.npz"
  norm_params:   "saved_models/norm_params_512x256.npz"
  results_dir:   "data/raw"

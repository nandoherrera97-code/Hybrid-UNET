model:
  input_shape: [256, 512, 1]   # (H, W, canales)

training:
  epochs: 1000
  batch_size: 4              # reducido respecto al grid 80×200 por mayor resolución
  val_size:  0.15            # fracción de validación (early stopping) — sobre el total
  test_size: 0.15            # fracción de test hold-out — nunca visto durante el entrenamiento
  random_state: 42
  patience: 10

evaluation:
  example_case: 15            # Índice del caso a visualizar individualmente (cell 9 del notebook)
  t_openfoam: 2770.09         # Tiempo de referencia OpenFOAM en segundos (cell 14 del notebook)
  nearwall_cells: 5           # Equivale al mismo grosor físico que nearwall_cells=2 en grid 80×200
                              # (ratio de resolución: 0.01/0.00391 ≈ 2.56 → round(2×2.56) = 5)

paths:
  dataset:     "data/processed/CNN_df_512x256.pkl"
  saved_model: "saved_models/best_model_256x512.weights.h5"
  results_dir: "data/results"
